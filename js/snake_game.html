<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triple Snake</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen:wght@400;700&display=swap');

  :root {
    --bg: #0a0a12;
    --grid-bg: #0d0d1a;
    --grid-line: #1a1a2e;
    --red: #ff3c5f;
    --red-glow: #ff3c5f88;
    --blue: #3c9eff;
    --blue-glow: #3c9eff88;
    --green: #3cff7e;
    --green-glow: #3cff7e88;
    --dot: #fffbe6;
    --dot-glow: #fffbe688;
    --text: #e0e0f0;
    --muted: #6a6a8a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Silkscreen', cursive;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  h1 {
    font-family: 'Press Start 2P', cursive;
    font-size: 28px;
    letter-spacing: 4px;
    margin-bottom: 10px;
    background: linear-gradient(90deg, var(--red), var(--blue), var(--green));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    filter: drop-shadow(0 0 20px rgba(255,255,255,0.15));
  }

  .subtitle {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 16px;
    letter-spacing: 2px;
  }

  #scoreboard {
    display: flex;
    gap: 40px;
    margin-bottom: 14px;
    font-family: 'Press Start 2P', cursive;
    font-size: 13px;
  }

  .score-item {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .score-dot {
    width: 14px;
    height: 14px;
    border-radius: 3px;
  }

  .score-dot.red { background: var(--red); box-shadow: 0 0 10px var(--red-glow); }
  .score-dot.blue { background: var(--blue); box-shadow: 0 0 10px var(--blue-glow); }
  .score-dot.green { background: var(--green); box-shadow: 0 0 10px var(--green-glow); }

  .score-label { color: var(--muted); font-size: 9px; }

  #timer {
    font-family: 'Press Start 2P', cursive;
    font-size: 22px;
    margin-bottom: 12px;
    color: var(--dot);
    text-shadow: 0 0 12px var(--dot-glow);
    letter-spacing: 3px;
    min-height: 30px;
  }

  #timer.urgent {
    color: #ff3c5f;
    text-shadow: 0 0 16px rgba(255,60,95,0.6);
    animation: timerPulse 0.5s ease-in-out infinite;
  }

  @keyframes timerPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(1.08); }
  }

  #gameCanvas {
    border: 2px solid #2a2a4a;
    border-radius: 6px;
    box-shadow: 0 0 40px rgba(60, 60, 120, 0.3), inset 0 0 60px rgba(0,0,0,0.4);
    image-rendering: pixelated;
  }

  #controls {
    display: flex;
    gap: 50px;
    margin-top: 18px;
    font-size: 10px;
    color: var(--muted);
  }

  .control-group {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .control-group .label {
    font-family: 'Press Start 2P', cursive;
    font-size: 9px;
    margin-bottom: 2px;
  }

  .control-group .label.red { color: var(--red); }
  .control-group .label.blue { color: var(--blue); }
  .control-group .label.green { color: var(--green); }

  .keys {
    display: grid;
    grid-template-columns: repeat(3, 28px);
    grid-template-rows: repeat(2, 24px);
    gap: 3px;
    justify-items: center;
    align-items: center;
  }

  .key {
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    border-radius: 4px;
    width: 28px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Press Start 2P', cursive;
    font-size: 7px;
    color: var(--text);
  }

  .key.blank { background: transparent; border: none; }

  #message {
    font-family: 'Press Start 2P', cursive;
    font-size: 14px;
    margin-top: 18px;
    min-height: 24px;
    text-align: center;
    color: var(--dot);
    text-shadow: 0 0 15px var(--dot-glow);
    animation: pulse 1.2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  #message.winner {
    animation: winPulse 0.6s ease-in-out infinite;
    font-size: 16px;
  }

  @keyframes winPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.05); }
  }

  #restartHint {
    font-size: 10px;
    color: var(--muted);
    margin-top: 8px;
    min-height: 16px;
  }
</style>
</head>
<body>

<h1>TRIPLE SNAKE</h1>
<div class="subtitle">3 PLAYERS &bull; 30 SECONDS &bull; NO MERCY</div>

<div id="scoreboard">
  <div class="score-item">
    <div class="score-dot red"></div>
    <span id="score0">0</span>
  </div>
  <div class="score-item">
    <div class="score-dot blue"></div>
    <span id="score1">0</span>
  </div>
  <div class="score-item">
    <div class="score-dot green"></div>
    <span id="score2">0</span>
  </div>
</div>

<div id="timer">0:30</div>

<canvas id="gameCanvas"></canvas>

<div id="controls">
  <div class="control-group">
    <div class="label red">P1</div>
    <div class="keys">
      <div class="key blank"></div><div class="key">W</div><div class="key blank"></div>
      <div class="key">A</div><div class="key">S</div><div class="key">D</div>
    </div>
  </div>
  <div class="control-group">
    <div class="label blue">P2</div>
    <div class="keys">
      <div class="key blank"></div><div class="key">&uarr;</div><div class="key blank"></div>
      <div class="key">&larr;</div><div class="key">&darr;</div><div class="key">&rarr;</div>
    </div>
  </div>
  <div class="control-group">
    <div class="label green">P3</div>
    <div class="keys">
      <div class="key blank"></div><div class="key">I</div><div class="key blank"></div>
      <div class="key">J</div><div class="key">K</div><div class="key">L</div>
    </div>
  </div>
</div>

<div id="message">PRESS SPACE TO START</div>
<div id="restartHint"></div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const COLS = 40;
const ROWS = 30;
const CELL = 18;
canvas.width = COLS * CELL;
canvas.height = ROWS * CELL;

const SNAKE_LEN = 50;
const TOTAL_DOTS = 11;
const TICK_RATE = 80; // ms per game tick
const GAME_DURATION = 30; // seconds

const COLORS = {
  snakes: [
    { body: '#ff3c5f', head: '#ff6b88', glow: 'rgba(255,60,95,0.4)' },
    { body: '#3c9eff', head: '#6bb8ff', glow: 'rgba(60,158,255,0.4)' },
    { body: '#3cff7e', head: '#6bffaa', glow: 'rgba(60,255,126,0.4)' },
  ],
  dot: '#fffbe6',
  dotGlow: 'rgba(255,251,230,0.5)',
};

// Key bindings
const KEY_MAP = {
  // P1: WASD
  'w': { player: 0, dir: { x: 0, y: -1 } },
  'a': { player: 0, dir: { x: -1, y: 0 } },
  's': { player: 0, dir: { x: 0, y: 1 } },
  'd': { player: 0, dir: { x: 1, y: 0 } },
  // P2: Arrows
  'arrowup': { player: 1, dir: { x: 0, y: -1 } },
  'arrowleft': { player: 1, dir: { x: -1, y: 0 } },
  'arrowdown': { player: 1, dir: { x: 0, y: 1 } },
  'arrowright': { player: 1, dir: { x: 1, y: 0 } },
  // P3: IJKL
  'i': { player: 2, dir: { x: 0, y: -1 } },
  'j': { player: 2, dir: { x: -1, y: 0 } },
  'k': { player: 2, dir: { x: 0, y: 1 } },
  'l': { player: 2, dir: { x: 1, y: 0 } },
};

let snakes, dots, scores, gameOver, keysHeld, started, waitingToStart;
let timeRemaining, timerInterval;

function floodFillReachesCorners(headX, headY, occupied) {
  // BFS from the head cell; check if all 4 corners are reachable
  const corners = [
    `0,0`, `${COLS - 1},0`, `0,${ROWS - 1}`, `${COLS - 1},${ROWS - 1}`
  ];
  const cornersNeeded = new Set(corners);

  // If any corner is itself occupied, skip that corner (it's unreachable by definition
  // but that's fine — we only care about reachable open corners)
  for (const c of corners) {
    if (occupied.has(c)) cornersNeeded.delete(c);
  }
  if (cornersNeeded.size === 0) return true;

  const visited = new Set();
  const queue = [`${headX},${headY}`];
  visited.add(queue[0]);

  while (queue.length > 0) {
    const key = queue.shift();
    if (cornersNeeded.has(key)) {
      cornersNeeded.delete(key);
      if (cornersNeeded.size === 0) return true;
    }

    const [cx, cy] = key.split(',').map(Number);
    const neighbors = [
      [cx + 1, cy], [cx - 1, cy], [cx, cy + 1], [cx, cy - 1]
    ];
    for (const [nx, ny] of neighbors) {
      if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) continue;
      const nk = `${nx},${ny}`;
      if (!visited.has(nk) && !occupied.has(nk)) {
        visited.add(nk);
        queue.push(nk);
      }
    }
  }

  return cornersNeeded.size === 0;
}

function generateSquigglySnake(length, occupied) {
  // Random walk that never revisits a cell or leaves the grid
  const dirs = [
    { x: 1, y: 0 }, { x: -1, y: 0 },
    { x: 0, y: 1 }, { x: 0, y: -1 },
  ];

  for (let attempt = 0; attempt < 500; attempt++) {
    const startX = 2 + Math.floor(Math.random() * (COLS - 4));
    const startY = 2 + Math.floor(Math.random() * (ROWS - 4));
    const startKey = `${startX},${startY}`;
    if (occupied.has(startKey)) continue;

    const path = [{ x: startX, y: startY }];
    const visited = new Set([startKey]);

    while (path.length < length) {
      const cur = path[path.length - 1];
      // Shuffle directions for randomness
      const shuffled = dirs.slice().sort(() => Math.random() - 0.5);
      let moved = false;

      for (const d of shuffled) {
        const nx = cur.x + d.x;
        const ny = cur.y + d.y;
        const nk = `${nx},${ny}`;
        if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS &&
            !visited.has(nk) && !occupied.has(nk)) {
          path.push({ x: nx, y: ny });
          visited.add(nk);
          moved = true;
          break;
        }
      }

      if (!moved) break; // Dead end, retry
    }

    if (path.length === length) {
      // Temporarily add all path cells to occupied for flood fill check
      const tempOccupied = new Set(occupied);
      path.forEach(p => tempOccupied.add(`${p.x},${p.y}`));

      // Flood fill from head — must reach all 4 corners
      if (floodFillReachesCorners(path[0].x, path[0].y, tempOccupied)) {
        path.forEach(p => occupied.add(`${p.x},${p.y}`));
        return path;
      }
      // Otherwise this placement traps the head, retry
    }
  }
  return null;
}

function initGame() {
  gameOver = false;
  started = false;
  waitingToStart = true;
  scores = [0, 0, 0];
  keysHeld = [{ x: 0, y: 0 }, { x: 0, y: 0 }, { x: 0, y: 0 }];

  // Retry entire board generation if any snake can't be placed safely
  let success = false;
  for (let fullAttempt = 0; fullAttempt < 50; fullAttempt++) {
    snakes = [];
    const allOccupied = new Set();
    let allPlaced = true;

    for (let i = 0; i < 3; i++) {
      const body = generateSquigglySnake(SNAKE_LEN, allOccupied);
      if (body) {
        const facing = {
          x: body[0].x - body[1].x,
          y: body[0].y - body[1].y,
        };
        snakes.push({
          body,
          dir: { x: 0, y: 0 },
          lastDir: { ...facing },
        });
      } else {
        allPlaced = false;
        break;
      }
    }

    if (allPlaced) {
      // Final validation: check every snake head can still reach corners
      // with ALL snakes placed
      const finalOccupied = new Set();
      snakes.forEach(s => s.body.forEach(p => finalOccupied.add(`${p.x},${p.y}`)));

      let allFree = true;
      for (const snake of snakes) {
        const head = snake.body[0];
        // Occupied = all cells EXCEPT this snake's own head
        const checkOccupied = new Set(finalOccupied);
        checkOccupied.delete(`${head.x},${head.y}`);
        if (!floodFillReachesCorners(head.x, head.y, checkOccupied)) {
          allFree = false;
          break;
        }
      }

      if (allFree) {
        success = true;
        break;
      }
    }
  }

  // Ultimate fallback if generation fails
  if (!success) {
    snakes = [];
    const allOccupied = new Set();
    for (let i = 0; i < 3; i++) {
      const fy = 2 + i * (Math.floor(ROWS / 3));
      const body = [];
      for (let s = 0; s < SNAKE_LEN; s++) {
        body.push({ x: 2 + SNAKE_LEN - s, y: fy });
        allOccupied.add(`${2 + SNAKE_LEN - s},${fy}`);
      }
      snakes.push({
        body,
        dir: { x: 0, y: 0 },
        lastDir: { x: 1, y: 0 },
      });
    }
  }

  placeDots();
  updateScoreboard();
  timeRemaining = GAME_DURATION;
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  updateTimerDisplay();
  document.getElementById('message').textContent = 'PRESS SPACE TO START';
  document.getElementById('message').className = '';
  document.getElementById('message').style.color = '';
  document.getElementById('restartHint').textContent = '';
}

function placeDots() {
  dots = [];
  const occupied = new Set();
  snakes.forEach(s => s.body.forEach(p => occupied.add(`${p.x},${p.y}`)));

  let attempts = 0;
  while (dots.length < TOTAL_DOTS && attempts < 5000) {
    const x = Math.floor(Math.random() * COLS);
    const y = Math.floor(Math.random() * ROWS);
    const key = `${x},${y}`;
    if (!occupied.has(key)) {
      dots.push({ x, y });
      occupied.add(key);
    }
    attempts++;
  }
}

function updateScoreboard() {
  for (let i = 0; i < 3; i++) {
    document.getElementById(`score${i}`).textContent = scores[i];
  }
}

function updateTimerDisplay() {
  const el = document.getElementById('timer');
  const secs = Math.max(0, Math.ceil(timeRemaining));
  const mins = Math.floor(secs / 60);
  const s = secs % 60;
  el.textContent = `${mins}:${s.toString().padStart(2, '0')}`;
  if (secs <= 5 && !waitingToStart && !gameOver) {
    el.className = 'urgent';
  } else {
    el.className = '';
  }
}

function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  const startTime = Date.now();
  timerInterval = setInterval(() => {
    const elapsed = (Date.now() - startTime) / 1000;
    timeRemaining = GAME_DURATION - elapsed;
    updateTimerDisplay();
    if (timeRemaining <= 0) {
      timeRemaining = 0;
      updateTimerDisplay();
      clearInterval(timerInterval);
      timerInterval = null;
      if (!gameOver) {
        gameOver = true;
        endGame();
      }
    }
  }, 100);
}

// Input handling
const pressedKeys = new Set();

document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();
  if (KEY_MAP[key] || key === ' ') e.preventDefault();

  // Space to start (both initial start and restart after game over)
  if (waitingToStart && key === ' ') {
    waitingToStart = false;
    started = true;
    document.getElementById('message').textContent = '';
    document.getElementById('restartHint').textContent = '';
    startTimer();
    return;
  }

  if (gameOver && key === ' ') {
    initGame();
    return;
  }

  // Don't accept movement keys before game starts
  if (waitingToStart || gameOver) return;

  if (pressedKeys.has(key)) return;
  pressedKeys.add(key);

  const mapping = KEY_MAP[key];
  if (mapping) {
    const { player, dir } = mapping;
    keysHeld[player] = dir;
  }
});

document.addEventListener('keyup', (e) => {
  const key = e.key.toLowerCase();
  pressedKeys.delete(key);

  const mapping = KEY_MAP[key];
  if (mapping) {
    const { player, dir } = mapping;
    // Only stop if the released key matches the current held direction
    const h = keysHeld[player];
    if (h && h.x === dir.x && h.y === dir.y) {
      keysHeld[player] = { x: 0, y: 0 };
    }
  }
});

function tick() {
  if (gameOver || waitingToStart) return;

  // Build occupancy set of ALL snake body cells (excluding each snake's own tail
  // since it will vacate this tick if that snake moves)
  snakes.forEach((snake, idx) => {
    const held = keysHeld[idx];
    if (!held || (held.x === 0 && held.y === 0)) return;

    // Prevent 180-degree reversal
    const ld = snake.lastDir;
    if (ld.x !== 0 || ld.y !== 0) {
      if (held.x === -ld.x && held.y === -ld.y) return;
    }

    snake.dir = { ...held };
    snake.lastDir = { ...held };

    const head = snake.body[0];
    let nx = head.x + snake.dir.x;
    let ny = head.y + snake.dir.y;

    // Wrap around walls
    if (nx < 0) nx = COLS - 1;
    if (nx >= COLS) nx = 0;
    if (ny < 0) ny = ROWS - 1;
    if (ny >= ROWS) ny = 0;

    // Check collision with all snake bodies
    let blocked = false;
    for (let si = 0; si < snakes.length; si++) {
      const other = snakes[si];
      // Check all segments except the tail of the current snake
      // (since it moves away), but check ALL of other snakes
      const segs = other.body;
      const skipLast = (si === idx); // own tail will vacate
      const limit = skipLast ? segs.length - 1 : segs.length;
      for (let j = 0; j < limit; j++) {
        if (segs[j].x === nx && segs[j].y === ny) {
          blocked = true;
          break;
        }
      }
      if (blocked) break;
    }

    if (blocked) return; // Can't move there

    // Move: add new head, remove tail (constant length)
    snake.body.unshift({ x: nx, y: ny });
    snake.body.pop();

    // Check dot collision
    for (let d = dots.length - 1; d >= 0; d--) {
      if (dots[d].x === nx && dots[d].y === ny) {
        dots.splice(d, 1);
        scores[idx]++;
        updateScoreboard();
        break;
      }
    }
  });

  // Check game over
  if (dots.length === 0 && started) {
    gameOver = true;
    endGame();
  }
}

function endGame() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }

  const max = Math.max(...scores);
  const winners = [];
  const names = ['RED', 'BLUE', 'GREEN'];
  const colors = ['#ff3c5f', '#3c9eff', '#3cff7e'];

  scores.forEach((s, i) => { if (s === max) winners.push(i); });

  const msgEl = document.getElementById('message');
  msgEl.className = 'winner';

  if (winners.length === 1) {
    msgEl.textContent = `${names[winners[0]]} WINS!`;
    msgEl.style.color = colors[winners[0]];
  } else if (winners.length === 3) {
    msgEl.textContent = "THREE-WAY TIE!";
    msgEl.style.color = '#fffbe6';
  } else {
    const tied = winners.map(i => names[i]).join(' & ');
    msgEl.textContent = `TIE: ${tied}!`;
    msgEl.style.color = '#fffbe6';
  }

  document.getElementById('restartHint').textContent = 'PRESS SPACE FOR NEW GAME';
}

// ---- RENDERING ----
let dotPulse = 0;

function draw() {
  dotPulse += 0.05;

  // Background
  ctx.fillStyle = '#0d0d1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid lines
  ctx.strokeStyle = '#14142a';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath();
    ctx.moveTo(x * CELL, 0);
    ctx.lineTo(x * CELL, canvas.height);
    ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath();
    ctx.moveTo(0, y * CELL);
    ctx.lineTo(canvas.width, y * CELL);
    ctx.stroke();
  }

  // Dots
  const pulseSize = 1 + Math.sin(dotPulse) * 0.3;
  dots.forEach(dot => {
    const cx = dot.x * CELL + CELL / 2;
    const cy = dot.y * CELL + CELL / 2;
    const r = (CELL / 3) * pulseSize;

    ctx.save();
    ctx.shadowColor = COLORS.dotGlow;
    ctx.shadowBlur = 12;
    ctx.fillStyle = COLORS.dot;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });

  // Snakes
  snakes.forEach((snake, idx) => {
    const col = COLORS.snakes[idx];

    snake.body.forEach((seg, si) => {
      const alpha = 1 - (si / SNAKE_LEN) * 0.55;
      const x = seg.x * CELL + 1;
      const y = seg.y * CELL + 1;
      const s = CELL - 2;

      ctx.save();
      if (si === 0) {
        ctx.shadowColor = col.glow;
        ctx.shadowBlur = 10;
        ctx.fillStyle = col.head;
      } else {
        ctx.globalAlpha = alpha;
        ctx.fillStyle = col.body;
      }

      // Rounded rect
      const rr = 4;
      ctx.beginPath();
      ctx.moveTo(x + rr, y);
      ctx.lineTo(x + s - rr, y);
      ctx.quadraticCurveTo(x + s, y, x + s, y + rr);
      ctx.lineTo(x + s, y + s - rr);
      ctx.quadraticCurveTo(x + s, y + s, x + s - rr, y + s);
      ctx.lineTo(x + rr, y + s);
      ctx.quadraticCurveTo(x, y + s, x, y + s - rr);
      ctx.lineTo(x, y + rr);
      ctx.quadraticCurveTo(x, y, x + rr, y);
      ctx.closePath();
      ctx.fill();

      // Eyes on head
      if (si === 0) {
        ctx.globalAlpha = 1;
        const dir = snake.lastDir;
        const eyeOff = 3;
        let e1x, e1y, e2x, e2y;
        const midX = x + s / 2;
        const midY = y + s / 2;

        if (dir.x === 1) { e1x = midX + 3; e1y = midY - eyeOff; e2x = midX + 3; e2y = midY + eyeOff; }
        else if (dir.x === -1) { e1x = midX - 3; e1y = midY - eyeOff; e2x = midX - 3; e2y = midY + eyeOff; }
        else if (dir.y === -1) { e1x = midX - eyeOff; e1y = midY - 3; e2x = midX + eyeOff; e2y = midY - 3; }
        else if (dir.y === 1) { e1x = midX - eyeOff; e1y = midY + 3; e2x = midX + eyeOff; e2y = midY + 3; }
        else { e1x = midX - eyeOff; e1y = midY - 2; e2x = midX + eyeOff; e2y = midY - 2; }

        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(e1x, e1y, 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(e2x, e2y, 2.5, 0, Math.PI * 2); ctx.fill();

        ctx.fillStyle = '#111';
        ctx.beginPath(); ctx.arc(e1x, e1y, 1.2, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(e2x, e2y, 1.2, 0, Math.PI * 2); ctx.fill();
      }

      ctx.restore();
    });
  });
}

function gameLoop() {
  tick();
  draw();
}

initGame();
draw();
setInterval(gameLoop, TICK_RATE);
</script>
